<div class="hero mb-4">
    <h1>Partner Redemption Dashboard</h1>
    <p class="mb-0">Validate a QR token and confirm one-time redemption with minimal technical overhead.</p>
</div>

<div id="partnerAlerts"></div>

<div class="row g-4">
    <div class="col-md-4">
        <div class="card p-4">
            <h2>Dashboard</h2>
            <div id="metrics"></div>
        </div>
    </div>
    <div class="col-md-8">
        <div class="card p-4">
            <h2>Validate QR Token</h2>
            <div class="form-row mb-3">

                <div class="input-group-custom">
                    <input id="qr" class="form-control" placeholder="Example: JGW-AB12CD34">
                    <button id="paste-qr" class="icon-btn paste-btn" title="Paste from clipboard">
                        <svg viewBox="0 0 24 24"><path d="M19 2h-4.18C14.4.84 13.3 0 12 0c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm7 18H5V4h2v3h10V4h2v16z"/></svg>
                    </button>
                </div>

                <button id="validate" class="btn btn-secondary">Validate</button>
                <button id="redeem" class="btn btn-primary">Confirm Redemption</button>
            </div>
            <div id="result"></div>
        </div>
    </div>
</div>
