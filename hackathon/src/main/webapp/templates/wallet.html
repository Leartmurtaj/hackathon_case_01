<div class="hero wallet-card mb-4">
    <div>
        <h1>Digital Guest Card</h1>
        <p id="guestName" class="lead mb-1">Guest</p>
        <p>Card ID: <strong id="guestCard">JG-DEMO</strong></p>
    </div>
    <div>
        <label for="guest" class="form-label">Guest profile</label>
        <select id="guest" class="form-select"></select>
        <p class="mt-3 mb-0">Type: <strong>Overnight Guest</strong></p>
        <p class="mb-0">Benefits stored: <strong id="benefitCount">0</strong></p>
    </div>
</div>

<div id="alerts"></div>

<div class="grid" id="wallet"></div>

<!-- sort offers by ... menu -->
<section class="card timeline mt-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <h2 class="mb-1">Bookable Marketplace Offers</h2>
            <p class="meta mb-0">Add eligible offers to the guest wallet.</p>
        </div>

        <div class="sort-toolbar">
            <span class="meta me-2">Sort by:</span>
            <select id="sortCriteria" class="form-select-sm custom-select">
                <option value="popularity">Most Popular</option>
                <option value="price">Price</option>
                <option value="spots">Available Spots</option>
                <option value="type">Activity Type</option>
            </select>
            <button id="sortOrder" class="btn-sort" title="Toggle Order">
                <span id="sortDirIcon">↓</span>
            </button>
        </div>
    </div>

    <div id="offers" class="grid"></div>
</section>
